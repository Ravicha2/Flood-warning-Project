# ============================================================
# Logstash Pipeline — Flood Discharge Data (Open-Meteo Flood API)
# ============================================================
# Receives JSON documents from the Python fetch_flood_data.py
# script via HTTP input, enriches them with risk level and
# ingestion timestamp, then indexes into Elasticsearch with
# geo_shape rectangles for Kibana Map overlays.
# ============================================================

input {
  # ----------------------------------------------------------
  # HTTP Input — receives JSON POSTs from fetch_flood_data.py
  # Listens on port 8080 inside the container.
  # ----------------------------------------------------------
  http {
    port  => 8080
    codec => "json"
    type  => "flood_discharge"
    tags  => ["flood", "discharge", "open-meteo"]
  }
}

filter {
  if [type] == "flood_discharge" {

    # 1. Parse the 'timestamp' field (ISO date string, e.g. "2026-03-02")
    #    and set it as the event's @timestamp for proper time alignment.
    if [timestamp] {
      date {
        match    => ["timestamp", "yyyy-MM-dd", "ISO8601"]
        target   => "timestamp"
        timezone => "UTC"
      }
    }

    # 2. Ensure location is a valid geo_point object for ES mapping.
    #    The Python script already sends { "lat": ..., "lon": ... }
    #    but we convert to float to be safe.
    mutate {
      convert => {
        "[location][lat]" => "float"
        "[location][lon]" => "float"
      }
    }

    # 3. Convert river discharge to float for numeric mapping.
    mutate {
      convert => {
        "river_discharge_m3s" => "float"
        "latitude"            => "float"
        "longitude"           => "float"
      }
    }

    # 4. Derive risk_level from river discharge thresholds.
    #    Thresholds are approximate and region-agnostic:
    #      > 500 m³/s → critical
    #      > 200 m³/s → high
    #      > 50  m³/s → medium
    #      ≤ 50  m³/s → low
    ruby {
      code => "
        discharge = event.get('river_discharge_m3s').to_f
        risk = if discharge > 500
          'critical'
        elsif discharge > 200
          'high'
        elsif discharge > 50
          'medium'
        else
          'low'
        end
        event.set('risk_level', risk)
      "
    }

    # 5. Add ingestion timestamp so we know when Logstash processed it.
    mutate {
      add_field => { "ingested_at" => "%{@timestamp}" }
    }

    # 6. Remove Logstash / HTTP input metadata fields we don't need in ES.
    mutate {
      remove_field => [
        "headers", "host", "@version"
      ]
    }
  }
}

output {
  # ----------------------------------------------------------
  # Elasticsearch — flood-discharge-* (date-stamped index)
  # Uses the same ES credentials as the weather pipeline.
  # ----------------------------------------------------------
  if [type] == "flood_discharge" {
    elasticsearch {
      hosts    => ["${ELASTICSEARCH_HOST}"]
      user     => "${ELASTIC_USERNAME}"
      password => "${ELASTIC_PASSWORD}"
      index    => "flood-discharge-%{+YYYY.MM.dd}"
    }

    # Debug output — comment out in production
    stdout {
      codec => rubydebug
    }
  }
}
