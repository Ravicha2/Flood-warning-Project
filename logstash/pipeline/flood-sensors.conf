# ============================================================
# Logstash Pipeline — Weather Sensor Ingestion
# ============================================================
# Sources:
#   - OpenWeatherMap HTTP poller (weather data by city)
#   - Simulated sensor via TCP (hackathon demo)
# Outputs:
#   - Elasticsearch: flood-sensors-* index (date-stamped)
# ============================================================

input {
  # ----------------------------------------------------------
  # HTTP Poller — OpenWeatherMap API
  # Polls every 5 minutes for weather data at key locations.
  # The tag name (e.g. "queensland") is used in the filter
  # block below to derive sensor_id and station_name.
  # ----------------------------------------------------------
  http_poller {
    urls => {
      queensland => {
        method => "get"
        url    => "https://api.openweathermap.org/data/2.5/weather?lat=-27.4698&lon=153.0251&appid=${OPENWEATHERMAP_API_KEY}&units=metric"
      }
      hat_yai => {
        method => "get"
        url    => "https://api.openweathermap.org/data/2.5/weather?lat=7.0086&lon=100.4747&appid=${OPENWEATHERMAP_API_KEY}&units=metric"
      }
      sumatra => {
        method => "get"
        url    => "https://api.openweathermap.org/data/2.5/weather?lat=-0.7893&lon=113.9213&appid=${OPENWEATHERMAP_API_KEY}&units=metric"
      }
    }
    schedule        => { every => "5m" }
    request_timeout => 30
    codec           => "json"
    type            => "weather"
    tags            => ["weather", "openweathermap"]
  }

  # ----------------------------------------------------------
  # Beats Input — For future Filebeat / Metricbeat integration
  # ----------------------------------------------------------
  beats {
    port => 5044
    type => "beats"
  }

  # ----------------------------------------------------------
  # TCP Input — For simulated sensor data during hackathon demo
  # Send JSON lines via:
  #   echo '{"sensor_id":"DEMO-001","water_level":1.5,"rainfall_mm":20}' | nc localhost 5045
  # ----------------------------------------------------------
  tcp {
    port  => 5045
    codec => "json_lines"
    type  => "sensor_simulated"
    tags  => ["sensor", "simulated"]
  }
}

filter {
  # ----------------------------------------------------------
  # Weather data transformation (OpenWeatherMap → ES schema)
  # ----------------------------------------------------------
  if [type] == "weather" {

    # 1. Build geo_point from coord.lat / coord.lon
    #    Elasticsearch expects { "lat": ..., "lon": ... }
    mutate {
      rename => {
        "[coord][lat]" => "[location][lat]"
        "[coord][lon]" => "[location][lon]"
      }
    }

    # 2. Rename weather metric fields to our schema names
    mutate {
      rename => {
        "[main][temp]"     => "temperature_c"
        "[main][humidity]" => "humidity_pct"
        "[wind][speed]"    => "wind_speed_ms"
      }
    }

    # 3. Extract rainfall_mm — OpenWeatherMap reports rain in [rain][1h] or [rain][3h]
    #    Default to 0 if the field is absent (no rain reported).
    if [rain][1h] {
      mutate { rename => { "[rain][1h]" => "rainfall_mm" } }
    } else if [rain][3h] {
      ruby {
        code => "event.set('rainfall_mm', (event.get('[rain][3h]').to_f / 3.0).round(2))"
      }
    } else {
      mutate { add_field => { "rainfall_mm" => 0 } }
    }

    # 4. Derive sensor_id and station_name from the HTTP poller URL label
    #    The label is injected via [metadata][name] by the http_poller plugin.
    #    We use a static map so sensor IDs match the seed data format.
    if [metadata][name] == "queensland" {
      mutate {
        add_field => {
          "sensor_id"    => "QLD-OWM"
          "station_name" => "Brisbane Weather Station (OWM)"
        }
      }
    } else if [metadata][name] == "hat_yai" {
      mutate {
        add_field => {
          "sensor_id"    => "HTY-OWM"
          "station_name" => "Hat Yai Weather Station (OWM)"
        }
      }
    } else if [metadata][name] == "sumatra" {
      mutate {
        add_field => {
          "sensor_id"    => "SUM-OWM"
          "station_name" => "Sumatra Weather Station (OWM)"
        }
      }
    } else {
      mutate {
        add_field => {
          "sensor_id"    => "UNKNOWN-OWM"
          "station_name" => "Unknown OWM Station"
        }
      }
    }

    # 5. Set source and water_level (OWM provides no gauge readings;
    #    water_level is set to 0 as a placeholder for schema compliance)
    mutate {
      add_field => {
        "source"          => "openweathermap"
        "water_level"     => 0
        "water_level_unit" => "metres"
      }
    }

    # 6. Convert rainfall_mm to float for ES mapping compatibility
    mutate {
      convert => {
        "rainfall_mm"   => "float"
        "water_level"   => "float"
        "temperature_c" => "float"
        "humidity_pct"  => "float"
        "wind_speed_ms" => "float"
      }
    }

    # 7. Derive risk_level from rainfall thresholds:
    #    > 100 mm → high | > 50 mm → medium | else → low
    ruby {
      code => "
        rain = event.get('rainfall_mm').to_f
        risk = if rain > 100
          'high'
        elsif rain > 50
          'medium'
        else
          'low'
        end
        event.set('risk_level', risk)
      "
    }

    # 8. Parse Unix epoch timestamp from OpenWeatherMap 'dt' field
    #    and write it to the 'timestamp' field in our schema.
    if [dt] {
      date {
        match    => ["dt", "UNIX"]
        target   => "timestamp"
        timezone => "UTC"
      }
    } else {
      mutate { add_field => { "timestamp" => "%{@timestamp}" } }
    }

    # 9. Remove raw OWM fields we no longer need to keep the document slim
    mutate {
      remove_field => [
        "main", "wind", "rain", "clouds", "sys", "coord",
        "weather", "visibility", "base", "dt", "timezone", "id", "cod"
      ]
    }
  }

  # ----------------------------------------------------------
  # Simulated sensor enrichment (TCP demo input)
  # Adds a default location (Hat Yai) when not provided,
  # and fills in required schema fields with safe defaults.
  # ----------------------------------------------------------
  if [type] == "sensor_simulated" {

    # Default location for demo if not provided by the sender
    if ![location] {
      mutate {
        add_field => {
          "[location][lat]" => 7.0086
          "[location][lon]" => 100.4747
        }
      }
    }

    # Ensure required schema fields exist
    if ![source]          { mutate { add_field => { "source"           => "simulated" } } }
    if ![risk_level]      { mutate { add_field => { "risk_level"       => "low"       } } }
    if ![water_level_unit] { mutate { add_field => { "water_level_unit" => "metres"    } } }
    if ![station_name]    { mutate { add_field => { "station_name"     => "Demo Sensor" } } }

    mutate {
      convert => {
        "[location][lat]" => "float"
        "[location][lon]" => "float"
      }
    }
  }

  # ----------------------------------------------------------
  # Add ingestion timestamp to ALL events (weather + simulated)
  # ----------------------------------------------------------
  mutate {
    add_field => { "ingested_at" => "%{@timestamp}" }
  }
}

output {
  # ----------------------------------------------------------
  # Elasticsearch Output — Primary sink
  # Index name uses daily date pattern so templates auto-apply.
  # ----------------------------------------------------------
  elasticsearch {
    hosts    => ["${ELASTICSEARCH_HOST}"]
    user     => "${ELASTIC_USERNAME}"
    password => "${ELASTIC_PASSWORD}"
    index    => "flood-sensors-%{+YYYY.MM.dd}"
  }

  # ----------------------------------------------------------
  # Stdout Output — Debug only; remove or comment out before going live
  # ----------------------------------------------------------
  stdout {
    codec => rubydebug
  }
}
