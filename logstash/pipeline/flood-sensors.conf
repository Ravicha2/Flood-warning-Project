# ============================================================
# Logstash Pipeline — Weather Sensor Ingestion
# ============================================================
# Sources:
#   - OpenWeatherMap HTTP poller (weather data by city)
#   - Simulated sensor HTTP endpoint
# Outputs:
#   - Elasticsearch: flood-sensors-* index
# ============================================================

input {
  # ----------------------------------------------------------
  # HTTP Poller — OpenWeatherMap API
  # Polls every 5 minutes for weather data at key locations.
  # TODO: Add your target city coordinates here.
  # ----------------------------------------------------------
  http_poller {
    urls => {
      # Format: "label" => { url, method, headers }
      queensland => {
        method => "get"
        url    => "https://api.openweathermap.org/data/2.5/weather?lat=-27.4698&lon=153.0251&appid=${OPENWEATHERMAP_API_KEY}&units=metric"
      }
      hat_yai => {
        method => "get"
        url    => "https://api.openweathermap.org/data/2.5/weather?lat=7.0086&lon=100.4747&appid=${OPENWEATHERMAP_API_KEY}&units=metric"
      }
      sumatra => {
        method => "get"
        url    => "https://api.openweathermap.org/data/2.5/weather?lat=-0.7893&lon=113.9213&appid=${OPENWEATHERMAP_API_KEY}&units=metric"
      }
    }
    schedule        => { every => "5m" }
    request_timeout => 30
    codec           => "json"
    type            => "weather"
    tags            => ["weather", "openweathermap"]
  }

  # ----------------------------------------------------------
  # Beats Input — For future Filebeat / Metricbeat integration
  # ----------------------------------------------------------
  beats {
    port => 5044
    type => "beats"
  }

  # ----------------------------------------------------------
  # TCP Input — For simulated sensor data during hackathon demo
  # Send JSON lines via: echo '{"sensor_id":"s001","water_level":1.2}' | nc localhost 5045
  # ----------------------------------------------------------
  tcp {
    port  => 5045
    codec => "json_lines"
    type  => "sensor_simulated"
    tags  => ["sensor", "simulated"]
  }
}

filter {
  # ----------------------------------------------------------
  # Weather data transformation
  # ----------------------------------------------------------
  if [type] == "weather" {
    # TODO: Extract and map OpenWeatherMap fields to our schema
    # mutate { ... }
    # date { ... }
    # Example: map coord.lat/lon → geo_point format
  }

  # ----------------------------------------------------------
  # Sensor data transformation (simulated)
  # ----------------------------------------------------------
  if [type] == "sensor_simulated" {
    # TODO: Validate and enrich sensor data
    # mutate { ... }
  }

  # ----------------------------------------------------------
  # Add ingestion timestamp to all events
  # ----------------------------------------------------------
  mutate {
    add_field => {
      "ingested_at" => "%{@timestamp}"
    }
  }
}

output {
  # ----------------------------------------------------------
  # Elasticsearch Output — Primary sink
  # ----------------------------------------------------------
  elasticsearch {
    hosts     => ["${ELASTICSEARCH_HOST}"]
    user      => "${ELASTIC_USERNAME}"
    password  => "${ELASTIC_PASSWORD}"
    index     => "flood-sensors-%{+YYYY.MM.dd}"
    # Data stream alternative:
    # data_stream => true
    # data_stream_type => "logs"
    # data_stream_dataset => "flood.sensors"
    # data_stream_namespace => "default"
  }

  # ----------------------------------------------------------
  # Stdout Output — Debug only, remove in production
  # ----------------------------------------------------------
  stdout {
    codec => rubydebug
  }
}
